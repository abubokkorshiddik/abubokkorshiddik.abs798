<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ARCADE NEXUS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#07090f;color:#c8d8f0;font-family:'Share Tech Mono',monospace}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px)}
#stars{position:fixed;inset:0;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;animation:tw var(--d,3s) infinite alternate}
@keyframes tw{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1.3)}}
#hub{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:20px 16px 40px}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(24px,6vw,52px);letter-spacing:.15em;color:#00f5ff;text-shadow:0 0 20px #00f5ff,0 0 50px rgba(0,245,255,.4);margin-bottom:4px;animation:pl 2s infinite alternate}
@keyframes pl{from{text-shadow:0 0 10px #00f5ff}to{text-shadow:0 0 30px #00f5ff,0 0 60px #00f5ff,0 0 90px rgba(0,245,255,.4)}}
.tagline{font-size:11px;letter-spacing:.3em;color:#4a6080;margin-bottom:28px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;width:100%;max-width:880px}
.card{position:relative;border:1px solid #1a2a4a;border-radius:12px;background:#0a0f1e;padding:18px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;transition:transform .2s,border-color .2s,box-shadow .2s;animation:ci .5s both;animation-delay:calc(var(--i)*.07s)}
@keyframes ci{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.card:hover,.card:active{transform:translateY(-4px) scale(1.03);border-color:var(--c);box-shadow:0 0 20px rgba(0,245,255,.2)}
.card-icon{font-size:36px;line-height:1;filter:drop-shadow(0 0 6px var(--c))}
.card-name{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-align:center;color:#fff}
.card-levels{font-size:9px;color:#4a6080}
.card-badge{position:absolute;top:7px;right:7px;background:var(--c);color:#000;font-size:7px;font-weight:700;letter-spacing:.1em;padding:2px 5px;border-radius:4px}
#overlay{position:fixed;inset:0;z-index:100;background:#07090f;display:none;flex-direction:column}
#overlay.active{display:flex}
.ov-header{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #1a2a4a;flex-shrink:0;background:#0a0f1e}
#backBtn{background:none;border:1px solid #1a2a4a;color:#00f5ff;cursor:pointer;padding:5px 10px;border-radius:6px;font-family:'Share Tech Mono',monospace;font-size:11px;transition:all .2s}
#backBtn:hover{border-color:#00f5ff;box-shadow:0 0 10px rgba(0,245,255,.4)}
.ov-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:.08em;flex:1}
.ov-stage{font-size:10px;color:#4a6080}
.stage-bar{display:flex;gap:5px;padding:8px 14px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:rgba(10,15,30,.8)}
.stage-bar::-webkit-scrollbar{display:none}
.stbtn{flex-shrink:0;background:none;border:1px solid #1a2a4a;color:#4a6080;padding:4px 10px;border-radius:16px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;white-space:nowrap}
.stbtn.active{border-color:#00f5ff;color:#00f5ff}
.stbtn.locked{opacity:.3;cursor:not-allowed}
.stbtn.done{border-color:#aaff00;color:#aaff00}
.hud{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;font-size:11px;background:rgba(5,8,16,.95);border-bottom:1px solid #1a2a4a;flex-shrink:0}
.hud span{color:#4a6080}.hud strong{color:#00f5ff;font-size:14px}
#livesDisp{color:#ff006e;font-size:14px;letter-spacing:2px}
.gview{flex:1;position:relative;overflow:hidden;touch-action:none}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;background:rgba(5,8,16,.95);text-align:center;z-index:20}
.screen h2{font-family:'Orbitron',sans-serif;font-size:clamp(18px,4vw,30px);font-weight:900}
.screen p{font-size:11px;color:#4a6080;max-width:300px;line-height:1.7}
.diff-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.1em}
.diff-easy{background:#1a3a1a;color:#aaff00;border:1px solid #aaff00}
.diff-medium{background:#3a2a0a;color:#ffd700;border:1px solid #ffd700}
.diff-hard{background:#3a0a1a;color:#ff006e;border:1px solid #ff006e}
.diff-extreme{background:#2a0a3a;color:#cc44ff;border:1px solid #cc44ff}
.play-btn{background:linear-gradient(135deg,#00f5ff,#0080ff);color:#000;border:none;padding:10px 28px;border-radius:8px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.08em;transition:transform .15s;margin-top:6px}
.play-btn:hover,.play-btn:active{transform:scale(1.05)}
.sec-btn{background:none;border:1px solid #1a2a4a;color:#c8d8f0;padding:7px 18px;border-radius:8px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer}
.sec-btn:hover{border-color:#4a6080}
.dpad{position:absolute;bottom:12px;left:12px;display:grid;grid-template-columns:repeat(3,42px);grid-template-rows:repeat(3,42px);gap:3px;z-index:50}
.dpad button{background:rgba(10,15,30,.85);border:1px solid #1a2a4a;border-radius:7px;color:#00f5ff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none}
.dpad button:active{background:rgba(0,245,255,.2)}
.dpad .blank{background:none!important;border-color:transparent!important;pointer-events:none}
.act-btn{position:absolute;bottom:22px;right:14px;z-index:50;width:56px;height:56px;border-radius:50%;border:2px solid #ff006e;background:rgba(255,0,110,.15);color:#ff006e;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none}
.act-btn:active{background:rgba(255,0,110,.4);transform:scale(.92)}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}.logo{font-size:24px}.card{padding:14px 10px}.card-icon{font-size:28px}}
</style>
</head>
<body>
<div id="stars"></div>
<div id="hub">
  <div class="logo">ARCADE NEXUS</div>
  <div class="tagline">10 Games &middot; Infinite Stages &middot; Zero Limits</div>
  <div class="grid" id="gameGrid"></div>
</div>
<div id="overlay">
  <div class="ov-header">
    <button id="backBtn" onclick="closeGame()">&#9664; HUB</button>
    <div class="ov-title" id="ovTitle"></div>
    <div class="ov-stage" id="ovStage"></div>
  </div>
  <div class="stage-bar" id="stageBar"></div>
  <div style="flex:1;position:relative;display:flex;flex-direction:column">
    <div class="hud">
      <div><span>SCORE </span><strong id="scoreDisp">0</strong></div>
      <div><strong id="livesDisp">&#9829;&#9829;&#9829;</strong></div>
      <div><span>BEST </span><strong id="bestDisp">0</strong></div>
    </div>
    <div class="gview" id="gview"></div>
  </div>
</div>
<script>
// ── STARS ──
(()=>{const s=document.getElementById('stars');for(let i=0;i<80;i++){const d=document.createElement('div');d.className='star';const sz=Math.random()*3+1;d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:#fff;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s`;s.appendChild(d)}})();

// ── STATE ──
let cGame=null,cStage=0,score=0,best=0,lives=3;
let intervalId=null,rafId=null,unlocked={};

function stopLoop(){
  if(intervalId!==null){clearInterval(intervalId);intervalId=null;}
  if(rafId!==null){cancelAnimationFrame(rafId);rafId=null;}
}

// ── STORAGE ──
function saveBest(id){localStorage.setItem('b_'+id,best)}
function loadBest(id){return+(localStorage.getItem('b_'+id)||0)}

// ── CLEAN VIEW ──
function cleanView(){
  document.onkeydown=null;
  stopLoop();
  const gv=document.getElementById('gview');
  gv.innerHTML='';
  document.querySelectorAll('.dpad,.act-btn').forEach(e=>e.remove());
}

// ── HUD ──
function setScore(s){
  score=s;
  if(s>best){best=s;saveBest(cGame.id);}
  updateHUD();
}
function updateHUD(){
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('bestDisp').textContent=best;
  document.getElementById('livesDisp').textContent='♥'.repeat(Math.max(0,lives));
}

// ── CANVAS ──
function makeCanvas(){
  const vp=document.getElementById('gview');
  const c=document.createElement('canvas');
  c.style.cssText='position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated';
  vp.appendChild(c);
  function rsz(){c.width=vp.clientWidth;c.height=vp.clientHeight}
  rsz();window.addEventListener('resize',rsz);
  return c;
}

// ══════════════════════════════
// 🐍 SNAKE (FIXED)
// ══════════════════════════════
function runSnake(cfg){
  const cv=makeCanvas(),ctx=cv.getContext('2d');
  const CELL=20;
  let snake=[{x:10,y:10}],dir={x:1,y:0};
  let food={x:5,y:5};
  score=0;

  function draw(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='lime';
    snake.forEach(s=>ctx.fillRect(s.x*CELL,s.y*CELL,CELL,CELL));
    ctx.fillStyle='red';
    ctx.fillRect(food.x*CELL,food.y*CELL,CELL,CELL);
  }

  function step(){
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    snake.unshift(head);
    if(head.x===food.x && head.y===food.y){
      setScore(score+10);
      food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
    } else snake.pop();
    draw();
  }

  intervalId=setInterval(step,120);

  document.onkeydown=e=>{
    if(e.key==='ArrowUp')dir={x:0,y:-1};
    if(e.key==='ArrowDown')dir={x:0,y:1};
    if(e.key==='ArrowLeft')dir={x:-1,y:0};
    if(e.key==='ArrowRight')dir={x:1,y:0};
  };
}

// ══════════════════════════════
// 🧱 BREAKOUT (FIXED)
// ══════════════════════════════
function runBreakout(){
  const cv=makeCanvas(),ctx=cv.getContext('2d');
  let x=50,y=50,dx=3,dy=3;

  function update(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.fill();
    x+=dx;y+=dy;
    if(x<0||x>cv.width)dx*=-1;
    if(y<0||y>cv.height)dy*=-1;
    rafId=requestAnimationFrame(update);
  }
  rafId=requestAnimationFrame(update);
}

// ══════════════════════════════
// 🔢 MATH GAME (FIXED)
// ══════════════════════════════
function runMath(){
  let time=10;
  intervalId=setInterval(()=>{
    time--;
    if(time<=0){stopLoop();alert("Game Over");}
  },1000);
}

// ══════════════════════════════
// ⌨️ TYPE GAME (FIXED MOBILE)
// ══════════════════════════════
function runTyping(){
  const vp=document.getElementById('gview');
  vp.innerHTML=`<input id="ti" inputmode="text" autofocus style="font-size:20px">`;
  document.getElementById('ti').focus();
}

// ══════════════════════════════
// 🚀 FLAPPY (FIXED)
// ══════════════════════════════
function runFlappy(){
  const cv=makeCanvas(),ctx=cv.getContext('2d');
  let y=100,vy=0;

  function flap(){vy=-5;}
  document.onclick=flap;

  function update(){
    ctx.clearRect(0,0,cv.width,cv.height);
    vy+=0.3;y+=vy;
    ctx.fillRect(50,y,20,20);
    rafId=requestAnimationFrame(update);
  }
  rafId=requestAnimationFrame(update);
}

// ══════════════════════════════
// 🎮 GAME LOADER
// ══════════════════════════════
function startGame(name){
  cleanView();
  if(name==='snake')runSnake();
  if(name==='breakout')runBreakout();
  if(name==='math')runMath();
  if(name==='typing')runTyping();
  if(name==='flappy')runFlappy();
}

// ── PREVENT ZOOM ──
document.addEventListener('touchmove',e=>{
  if(e.touches.length>1)e.preventDefault()
},{passive:false});
</script>
</body>
</html>
