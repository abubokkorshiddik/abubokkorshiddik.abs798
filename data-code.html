<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data and Code Lab</title>

<style>

body {
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  background: #f8fafc;
}

/* NAV */
.navbar {
  background: linear-gradient(90deg, #00264d, #004080);
}

.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 10px;
  display: flex;
  justify-content: center;
  gap: 12px;
}

.nav-inner a {
  color: white;
  text-decoration: none;
  font-weight: 600;
}

/* HEADER */
.header {
  text-align: center;
  background: #020617;
  color: white;
  padding: 25px;
}

/* CARD */
.card {
  max-width: 1100px;
  margin: 25px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.06);
}

/* TITLE */
.card h2 {
  margin-bottom: 10px;
}

/* BUTTON */
.btn {
  background: #1d4ed8;
  color: white;
  border: none;
  padding: 8px 12px;
  margin: 6px 6px 12px 0;
  border-radius: 5px;
  cursor: pointer;
}

.btn:hover {
  background: #1e40af;
}

/* FLEX */
.flex {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

/* BOX */
.box {
  flex: 1;
  min-width: 320px;
}

.scroll {
  max-height: 320px;
  overflow: auto;
  border: 1px solid #e5e7eb;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}

th, td {
  border: 1px solid #e5e7eb;
  padding: 6px;
  font-size: 13px;
}

th {
  background: #0b3a6e;
  color: white;
}

/* CODE */
textarea {
  width: 100%;
  height: 180px;
  margin-top: 10px;
  font-family: monospace;
}

/* FOOTER */
footer {
  text-align: center;
  background: #020617;
  color: white;
  padding: 15px;
}

</style>

</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="nav-inner">
    <a href="#">Home</a>
    <a href="#">Publications</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Data and Code Lab</h1>
</div>

<!-- MAIN CARD -->
<div class="card">

  <h2>Global TB Project</h2>

  <!-- DOWNLOAD -->
  <button class="btn" onclick="downloadFile(dataURL)">Download Dataset</button>
  <button class="btn" onclick="downloadFile(varURL)">Download Variables</button>
  <button class="btn" onclick="downloadFile(codeURL)">Download Code</button>

  <div class="flex">

    <!-- DATA -->
    <div class="box">
      <h3>Dataset (20 rows)</h3>
      <div class="scroll">
        <table id="dataTable"></table>
      </div>
    </div>

    <!-- VARIABLES -->
    <div class="box">
      <h3>Variables (20 rows)</h3>
      <div class="scroll">
        <table id="varTable"></table>
      </div>
    </div>

  </div>

  <!-- CODE -->
  <h3 style="margin-top:15px;">Code Preview</h3>
  <textarea id="codeBox"></textarea>

</div>

<!-- DRAFT CARD -->
<div class="card">

  <h2>Draft Dataset Card (Future Upload)</h2>

  <p>This card is ready for your next dataset.</p>

  <button class="btn">Download Dataset</button>
  <button class="btn">Download Variables</button>
  <button class="btn">Download Code</button>

  <div class="flex">

    <div class="box">
      <h3>Dataset Preview</h3>
      <div class="scroll">
        <table></table>
      </div>
    </div>

    <div class="box">
      <h3>Variables Preview</h3>
      <div class="scroll">
        <table></table>
      </div>
    </div>

  </div>

  <h3 style="margin-top:15px;">Code Preview</h3>
  <textarea></textarea>

</div>

<footer>
  © ABS Research Lab
</footer>

<script>

/* LINKS */
const dataURL = "https://raw.githubusercontent.com/abubokkorshiddik/Research-and-Publication/main/GlobalTB.csv";
const varURL = "https://raw.githubusercontent.com/abubokkorshiddik/Research-and-Publication/main/GlobalTBVariables.csv";
const codeURL = "https://raw.githubusercontent.com/abubokkorshiddik/Research-and-Publication/main/TBXAI.txt";

/* LOAD TABLE */
function loadTable(url, id) {

  fetch(url)
  .then(res => res.text())
  .then(text => {

    let rows = text.split("\n").slice(0, 20);
    let html = "";

    rows.forEach((row, i) => {
      html += "<tr>";
      row.split(",").forEach(cell => {
        html += i === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
      });
      html += "</tr>";
    });

    document.getElementById(id).innerHTML = html;

  });

}

/* LOAD CODE */
function loadCode() {
  fetch(codeURL)
  .then(res => res.text())
  .then(text => {
    document.getElementById("codeBox").value = text.split("\n").slice(0, 20).join("\n");
  });
}

/* DOWNLOAD */
function downloadFile(url) {
  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.download = "";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* INIT */
loadTable(dataURL, "dataTable");
loadTable(varURL, "varTable");
loadCode();

</script>

</body>
</html>
